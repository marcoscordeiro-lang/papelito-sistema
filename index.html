<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papelito | Faturamento × Frete</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --black:#1A1A1A;
  --black-soft:#262626;
  --yellow:#FFD600;
  --yellow-dark:#E6C200;
  --bg:#F5F5F3;
  --card:#FFFFFF;
  --border:#E5E5E0;
  --text:#1A1A1A;
  --muted:#767671;
  --ok:#1E8E3E;
  --warn:#C77700;
  --danger:#C0392B;
  --info:#2563EB;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
#app{display:flex;min-height:100vh;}

/* SIDEBAR */
#sidebar{
  width:250px;
  min-width:250px;
  background:var(--black);
  color:#fff;
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
#sidebar .logo{
  padding:24px 20px 16px 20px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #333;
}
#sidebar .logo .dot{
  width:14px;height:14px;border-radius:3px;background:var(--yellow);
}
#sidebar .logo .title{font-weight:800;font-size:17px;letter-spacing:.3px;}
#sidebar .logo .sub{font-size:11px;color:#999;margin-top:2px;}
#sidebar nav{padding:14px 10px;flex:1;}
.nav-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;text-align:left;
  background:transparent;border:none;color:#ccc;
  padding:11px 12px;border-radius:8px;font-size:13.5px;font-weight:600;
  cursor:pointer;margin-bottom:2px;transition:.15s;
}
.nav-btn:hover{background:#2c2c2c;color:#fff;}
.nav-btn.active{background:var(--yellow);color:var(--black);}
.nav-btn[disabled]{opacity:.35;cursor:not-allowed;}
.nav-btn .n{
  width:20px;height:20px;border-radius:5px;background:#333;color:#ccc;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none;
}
.nav-btn.active .n{background:var(--black);color:var(--yellow);}
#sidebar .footer{padding:14px 20px;font-size:10.5px;color:#666;border-top:1px solid #333;}

/* CONTENT */
#content{flex:1;padding:28px 32px;max-width:100%;overflow-x:hidden;}
.page-title{font-size:22px;font-weight:800;margin:0 0 4px 0;}
.page-sub{color:var(--muted);font-size:13.5px;margin:0 0 22px 0;}

/* CARDS / KPI */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-5{grid-template-columns:repeat(5,1fr);}
@media(max-width:1100px){.grid-4,.grid-3,.grid-5{grid-template-columns:repeat(2,1fr);}}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;
}
.kpi .label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.kpi .value{font-size:26px;font-weight:800;margin-top:6px;}
.kpi .bar{height:4px;border-radius:3px;background:var(--yellow);margin-top:12px;width:40%;}

.section{margin-bottom:26px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-head h3{font-size:15px;margin:0;font-weight:800;}

/* BUTTONS */
.btn{
  background:var(--black);color:var(--yellow);border:none;border-radius:8px;
  padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;
}
.btn:hover{background:#333;}
.btn-yellow{background:var(--yellow);color:var(--black);}
.btn-yellow:hover{background:var(--yellow-dark);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{background:#eee;}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:6px;}

/* TABLE */
.table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{
  background:var(--black);color:#fff;text-align:left;padding:10px 12px;
  position:sticky;top:0;white-space:nowrap;font-size:11.5px;letter-spacing:.3px;
}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{cursor:pointer;}
tbody tr:hover{background:#FFFBEA;}
.badge{
  display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;
}
.badge-ok{background:#E5F6EA;color:var(--ok);}
.badge-warn{background:#FFF3DC;color:var(--warn);}
.badge-na{background:#EEE;color:var(--muted);}
.badge-wait{background:#E6EEFF;color:var(--info);}

/* FILTER BAR */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center;}
.filters select,.filters input[type=text]{
  padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;background:#fff;min-width:130px;
}
.filters input[type=text]{min-width:220px;}
.filters .clear{color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;background:none;border:none;}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:12.5px;color:var(--muted);}
.pagination .pages{display:flex;gap:6px;}
.pagination button{border:1px solid var(--border);background:#fff;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;}
.pagination button.active{background:var(--black);color:var(--yellow);border-color:var(--black);}
.pagination button:disabled{opacity:.4;cursor:default;}

/* UPLOAD */
.upload-zone{
  border:2px dashed var(--border);border-radius:16px;background:var(--card);
  padding:60px 30px;text-align:center;max-width:640px;margin:40px auto;
}
.upload-zone.drag{border-color:var(--yellow);background:#FFFBEA;}
.upload-zone .icon{font-size:44px;margin-bottom:14px;}
.upload-zone h2{margin:0 0 6px;font-size:18px;}
.upload-zone p{color:var(--muted);font-size:13px;margin:0 0 20px;}

/* TRANSPORTADORA CARD */
.tcard{cursor:pointer;transition:.15s;}
.tcard:hover{border-color:var(--yellow);box-shadow:0 2px 10px rgba(0,0,0,.06);}
.tcard .name{font-weight:800;font-size:13px;margin-bottom:8px;}
.tcard .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:2px 0;}
.tcard .row b{color:var(--text);}

/* MODAL */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  z-index:999;
}
#modal-overlay.hidden{display:none;}
#modal{
  background:#fff;border-radius:14px;width:560px;max-width:92vw;max-height:86vh;overflow-y:auto;
  padding:0;
}
.modal-head{background:var(--black);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;border-radius:14px 14px 0 0;}
.modal-head h3{margin:0;font-size:16px;}
.modal-head .close{background:none;border:none;color:var(--yellow);font-size:22px;cursor:pointer;line-height:1;}
.modal-body{padding:20px 22px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;}
.modal-field .l{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.3px;}
.modal-field .v{font-size:14px;font-weight:600;margin-top:2px;}

/* MONTH / REGION CARDS */
.pickcard{cursor:pointer;transition:.15s;}
.pickcard.selected{border-color:var(--yellow);background:#FFFBEA;box-shadow:0 0 0 2px var(--yellow) inset;}
.pickcard:hover{border-color:var(--yellow-dark);}
.pickcard .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pickcard .top .name{font-weight:800;font-size:14px;}
.pickcard .top .chip{background:var(--black);color:var(--yellow);font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;}

.empty-state{padding:60px 20px;text-align:center;color:var(--muted);}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;height:320px;}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
@media(max-width:1100px){.two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">
      <div class="dot"></div>
      <div>
        <div class="title">PAPELITO</div>
        <div class="sub">Faturamento × Frete</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="footer">Marcos Cordeiro · Logística/Suprimentos</div>
  </aside>
  <main id="content"></main>
</div>
<div id="modal-overlay" class="hidden">
  <div id="modal"></div>
</div>

<script>
/* ============================================================
   ESTADO GLOBAL
============================================================ */
const state = {
  data: [],
  screen: 'upload',
  master: { search:'', mes:'', status:'', transportadora:'', uf:'', regiao:'', page:1, pageSize:25 },
  pend:   { mes:'', transportadora:'', uf:'', page:1, pageSize:25 },
  transp: { selected:null, page:1, pageSize:25 },
  mes:    { selected:null },
  regiao: { selected:null },
  charts: {}
};

const MES_ORDER = { Jan:1, Fev:2, Mar:3, Abr:4, Mai:5, Jun:6, Jul:7, Ago:8, Set:9, Out:10, Nov:11, Dez:12 };
const REGIOES = ['Norte','Nordeste','Centro-Oeste','Sudeste','Sul'];

const SCREENS = [
  { id:'upload',        label:'Upload',          n:1 },
  { id:'dashboard',     label:'Dashboard',        n:2 },
  { id:'master',        label:'Master NFs',       n:3 },
  { id:'pendencias',    label:'Pendências',       n:4 },
  { id:'transportadoras',label:'Transportadoras', n:5 },
  { id:'conciliacao',   label:'Conciliação',      n:6 },
  { id:'porMes',        label:'Por Mês',          n:7 },
  { id:'regiao',        label:'Filtro Região',    n:9 },
];

/* ============================================================
   HELPERS
============================================================ */
function fmtBRL(v){
  if(v===null||v===undefined||v===''||isNaN(v)) return '—';
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function fmtNum(v){ return v.toLocaleString('pt-BR'); }
function esc(s){ return (s===undefined||s===null) ? '' : String(s); }
function mesKey(mes){
  if(!mes) return 0;
  const [m,y] = mes.split('/');
  return (parseInt(y)*12) + (MES_ORDER[m]||0);
}
function sortMeses(list){
  return [...list].sort((a,b)=> mesKey(a)-mesKey(b));
}
function statusBadge(status){
  let cls='badge-na';
  if(status && status.indexOf('✔')>-1) cls='badge-ok';
  else if(status && status.indexOf('⚠')>-1) cls='badge-warn';
  else if(status && status.indexOf('⏳')>-1) cls='badge-wait';
  return `<span class="badge ${cls}">${esc(status)}</span>`;
}
function uniqueSorted(arr){ return [...new Set(arr.filter(x=>x!==undefined && x!==null && x!==''))].sort((a,b)=>a.localeCompare(b,'pt-BR')); }

function isConciliada(r){ return (r.status==='✔ Frete OK'||r.status==='✔ Encontrado') && !r.pendencia; }
function isDivergencia(r){
  const okStatus = (r.status==='✔ Frete OK'||r.status==='✔ Encontrado');
  const naStatus = r.status==='— Não aplica';
  return (okStatus && !!r.pendencia) || (naStatus && !!r.pendencia);
}
function isPendente(r){ return (r.status==='⚠ Preencher'||r.status==='⏳ Chegada na filial'); }
function isNaoAplica(r){ return r.status==='— Não aplica' && !r.pendencia; }

/* ============================================================
   NAVEGAÇÃO
============================================================ */
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = SCREENS.map(s=>{
    const disabled = state.data.length===0 && s.id!=='upload';
    return `<button class="nav-btn ${state.screen===s.id?'active':''}" ${disabled?'disabled':''} onclick="navigate('${s.id}')">
      <span class="n">${s.n}</span> ${s.label}
    </button>`;
  }).join('');
}
function navigate(screen){
  if(state.data.length===0 && screen!=='upload') return;
  state.screen = screen;
  renderNav();
  renderContent();
}

function renderContent(){
  const c = document.getElementById('content');
  switch(state.screen){
    case 'upload': c.innerHTML = tplUpload(); break;
    case 'dashboard': c.innerHTML = tplDashboard(); afterDashboard(); break;
    case 'master': c.innerHTML = tplMaster(); break;
    case 'pendencias': c.innerHTML = tplPendencias(); break;
    case 'transportadoras': c.innerHTML = tplTransportadoras(); break;
    case 'conciliacao': c.innerHTML = tplConciliacao(); break;
    case 'porMes': c.innerHTML = tplPorMes(); break;
    case 'regiao': c.innerHTML = tplRegiao(); break;
  }
}

/* ============================================================
   TELA 1 — UPLOAD
============================================================ */
function tplUpload(){
  const loaded = state.data.length>0;
  return `
    <h1 class="page-title">Importar Master de Pendências</h1>
    <p class="page-sub">Envie o arquivo Excel (.xlsx) com o cabeçalho na 4ª linha.</p>
    <div class="upload-zone" id="dropzone" ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <div class="icon">📄</div>
      <h2>${loaded ? 'Arquivo carregado com sucesso' : 'Arraste o arquivo aqui'}</h2>
      <p>${loaded ? state.data.length + ' NFs importadas — pode importar outro arquivo para substituir os dados.' : 'ou clique no botão abaixo para selecionar (.xlsx)'}</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(event.target.files[0])">
      <button class="btn btn-yellow" onclick="document.getElementById('fileInput').click()">Selecionar arquivo Excel</button>
      <div id="uploadMsg" style="margin-top:14px;font-size:13px;color:var(--muted);"></div>
    </div>
    ${loaded ? `<div style="max-width:640px;margin:0 auto;"><button class="btn btn-outline" onclick="navigate('dashboard')">Ir para o Dashboard →</button></div>` : ''}
  `;
}
function handleDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(file) handleFile(file);
}
function handleFile(file){
  if(!file) return;
  const msg = ()=>document.getElementById('uploadMsg');
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      // linha 4 (índice 3) é o cabeçalho -> range começa em 3
      const rows = XLSX.utils.sheet_to_json(sheet, {range:3, defval:null});
      const parsed = rows.filter(r => r['Nº NF']!==null && r['Nº NF']!==undefined && r['Nº NF']!=='').map(r=>({
        mes: r['MÊS'] ?? '',
        trim: r['TRIM.'] ?? '',
        nf: r['Nº NF'] ?? '',
        empresa: r['EMPRESA'] ?? '',
        parceiro: r['PARCEIRO'] ?? '',
        cidade: r['CIDADE'] ?? '',
        uf: r['UF'] ?? '',
        tipo: r['TIPO'] ?? '',
        transportadora: r['TRANSPORTADORA'] ?? '',
        fat: (typeof r['FAT. (R$)']==='number') ? r['FAT. (R$)'] : parseBRNumber(r['FAT. (R$)']),
        frete: (typeof r['FRETE (R$)']==='number') ? r['FRETE (R$)'] : parseBRNumber(r['FRETE (R$)']),
        status: r['STATUS'] ?? '',
        pendencia: r['PENDÊNCIA'] ?? '',
        regiao: r['REGIÃO'] ?? '',
      }));
      if(parsed.length===0){
        if(msg()) msg().innerHTML = '<span style="color:var(--danger)">Nenhuma linha de dados encontrada. Verifique o layout do arquivo.</span>';
        return;
      }
      state.data = parsed;
      resetFilters();
      if(msg()) msg().innerHTML = `<span style="color:var(--ok)">${parsed.length} NFs carregadas com sucesso!</span>`;
      renderNav();
      navigate('dashboard');
    }catch(err){
      console.error(err);
      if(msg()) msg().innerHTML = '<span style="color:var(--danger)">Erro ao ler o arquivo: '+err.message+'</span>';
    }
  };
  reader.readAsArrayBuffer(file);
}
function parseBRNumber(v){
  if(v===null || v===undefined || v==='') return null;
  if(typeof v==='number') return v;
  const cleaned = String(v).replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'');
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : n;
}
function resetFilters(){
  state.master = { search:'', mes:'', status:'', transportadora:'', uf:'', regiao:'', page:1, pageSize:25 };
  state.pend   = { mes:'', transportadora:'', uf:'', page:1, pageSize:25 };
  state.transp = { selected:null, page:1, pageSize:25 };
  state.mes    = { selected:null };
  state.regiao = { selected:null };
}

/* ============================================================
   TELA 2 — DASHBOARD
============================================================ */
function tplDashboard(){
  const d = state.data;
  const totalNF = d.length;
  const comFrete = d.filter(r=> r.frete!==null && r.frete!==undefined).length;
  const pendentes = d.filter(r=> r.status==='⚠ Preencher').length;
  const totalFat = d.reduce((s,r)=> s + (r.fat||0), 0);

  const porTransp = groupByTransportadora(d).slice(0,6);

  return `
    <h1 class="page-title">Dashboard</h1>
    <p class="page-sub">Visão geral de faturamento e frete.</p>

    <div class="grid grid-4 section">
      <div class="card kpi"><div class="label">Total de NFs</div><div class="value">${fmtNum(totalNF)}</div><div class="bar"></div></div>
      <div class="card kpi"><div class="label">NFs com Frete</div><div class="value">${fmtNum(comFrete)}</div><div class="bar" style="width:${totalNF? Math.round(comFrete/totalNF*100):0}%"></div></div>
      <div class="card kpi"><div class="label">Pendentes (⚠ Preencher)</div><div class="value">${fmtNum(pendentes)}</div><div class="bar" style="width:${totalNF? Math.round(pendentes/totalNF*100):0}%;background:var(--warn)"></div></div>
      <div class="card kpi"><div class="label">Faturamento Total</div><div class="value" style="font-size:20px;">${fmtBRL(totalFat)}</div><div class="bar"></div></div>
    </div>

    <div class="section">
      <div class="section-head"><h3>Evolução por Mês</h3></div>
      <div class="chart-box"><canvas id="evoChart"></canvas></div>
    </div>

    <div class="section">
      <div class="section-head"><h3>Por Transportadora</h3><button class="btn-outline btn btn-sm" onclick="navigate('transportadoras')">Ver todas →</button></div>
      <div class="grid grid-3">
        ${porTransp.map(t=>`
          <div class="card tcard" onclick="openTransportadora('${escJs(t.nome)}')">
            <div class="name">${esc(t.nome)}</div>
            <div class="row"><span>NFs</span><b>${fmtNum(t.count)}</b></div>
            <div class="row"><span>Faturamento</span><b>${fmtBRL(t.fat)}</b></div>
            <div class="row"><span>Frete</span><b>${fmtBRL(t.frete)}</b></div>
            <div class="row"><span>Pendentes</span><b>${fmtNum(t.pendentes)}</b></div>
          </div>`).join('')}
      </div>
    </div>
  `;
}
function afterDashboard(){
  const meses = sortMeses(uniqueSorted(state.data.map(r=>r.mes)));
  const fatByMes = meses.map(m=> state.data.filter(r=>r.mes===m).reduce((s,r)=>s+(r.fat||0),0));
  const freteByMes = meses.map(m=> state.data.filter(r=>r.mes===m).reduce((s,r)=>s+(r.frete||0),0));
  const ctx = document.getElementById('evoChart');
  if(!ctx) return;
  if(state.charts.evo) state.charts.evo.destroy();
  state.charts.evo = new Chart(ctx, {
    type:'bar',
    data:{
      labels: meses,
      datasets:[
        { label:'Faturamento (R$)', data: fatByMes, backgroundColor:'#FFD600', order:2, yAxisID:'y' },
        { label:'Frete (R$)', data: freteByMes, type:'line', borderColor:'#1A1A1A', backgroundColor:'#1A1A1A', tension:.3, order:1, yAxisID:'y1' },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{
        y:{ position:'left', ticks:{ callback:(v)=>fmtBRL(v) } },
        y1:{ position:'right', grid:{drawOnChartArea:false}, ticks:{ callback:(v)=>fmtBRL(v) } }
      },
      plugins:{ legend:{position:'bottom'}, tooltip:{ callbacks:{ label:(c)=> c.dataset.label+': '+fmtBRL(c.parsed.y) } } }
    }
  });
}
function groupByTransportadora(data){
  const map = {};
  data.forEach(r=>{
    const k = r.transportadora || '— Não informada';
    if(!map[k]) map[k] = { nome:k, count:0, fat:0, frete:0, pendentes:0 };
    map[k].count++;
    map[k].fat += (r.fat||0);
    map[k].frete += (r.frete||0);
    if(r.status==='⚠ Preencher') map[k].pendentes++;
  });
  return Object.values(map).sort((a,b)=> b.fat-a.fat);
}
function escJs(s){ return String(s).replace(/'/g,"\\'"); }
function openTransportadora(nome){
  state.transp.selected = nome;
  state.transp.page = 1;
  navigate('transportadoras');
}

/* ============================================================
   TABELA GENÉRICA (usada em várias telas)
============================================================ */
function tableRows(rows, page, pageSize){
  const start = (page-1)*pageSize;
  return rows.slice(start, start+pageSize);
}
function paginationHtml(total, page, pageSize, fnName){
  const pages = Math.max(1, Math.ceil(total/pageSize));
  const start = total===0? 0 : (page-1)*pageSize+1;
  const end = Math.min(total, page*pageSize);
  let btns = '';
  const maxBtns = 7;
  let from = Math.max(1, page-3), to = Math.min(pages, from+maxBtns-1);
  from = Math.max(1, to-maxBtns+1);
  for(let p=from;p<=to;p++){
    btns += `<button class="${p===page?'active':''}" onclick="${fnName}(${p})">${p}</button>`;
  }
  return `
    <div class="pagination">
      <span>${start}–${end} de ${total}</span>
      <div class="pages">
        <button onclick="${fnName}(${page-1})" ${page<=1?'disabled':''}>‹</button>
        ${btns}
        <button onclick="${fnName}(${page+1})" ${page>=pages?'disabled':''}>›</button>
      </div>
    </div>`;
}
function renderNFTableBody(rows){
  return rows.map((r,i)=>`
    <tr onclick='openModal(${r.__idx})'>
      <td>${esc(r.mes)}</td>
      <td>${esc(r.nf)}</td>
      <td>${esc(r.parceiro)}</td>
      <td>${esc(r.cidade)}/${esc(r.uf)}</td>
      <td>${esc(r.transportadora)}</td>
      <td>${fmtBRL(r.fat)}</td>
      <td>${fmtBRL(r.frete)}</td>
      <td>${statusBadge(r.status)}</td>
      <td>${esc(r.regiao)}</td>
    </tr>`).join('');
}
const TABLE_HEAD = `<tr><th>Mês</th><th>Nº NF</th><th>Parceiro</th><th>Cidade/UF</th><th>Transportadora</th><th>Fat. (R$)</th><th>Frete (R$)</th><th>Status</th><th>Região</th></tr>`;

/* ============================================================
   TELA 3 — MASTER NFs
============================================================ */
function withIdx(rows){
  return rows.map(r=>({...r, __idx: state.data.indexOf(r)}));
}
function applyMasterFilters(){
  const f = state.master;
  let rows = withIdx(state.data);
  if(f.search){
    const s = f.search.toLowerCase();
    rows = rows.filter(r => String(r.nf).includes(s) || (r.parceiro||'').toLowerCase().includes(s) || (r.cidade||'').toLowerCase().includes(s));
  }
  if(f.mes) rows = rows.filter(r=>r.mes===f.mes);
  if(f.status) rows = rows.filter(r=>r.status===f.status);
  if(f.transportadora) rows = rows.filter(r=>r.transportadora===f.transportadora);
  if(f.uf) rows = rows.filter(r=>r.uf===f.uf);
  if(f.regiao) rows = rows.filter(r=>r.regiao===f.regiao);
  return rows;
}
function tplMaster(){
  const f = state.master;
  const rows = applyMasterFilters();
  const pageRows = tableRows(rows, f.page, f.pageSize);
  const meses = sortMeses(uniqueSorted(state.data.map(r=>r.mes)));
  const statuses = uniqueSorted(state.data.map(r=>r.status));
  const transps = uniqueSorted(state.data.map(r=>r.transportadora));
  const ufs = uniqueSorted(state.data.map(r=>r.uf));

  return `
    <h1 class="page-title">Master NFs</h1>
    <p class="page-sub">${fmtNum(rows.length)} notas encontradas de ${fmtNum(state.data.length)} totais.</p>
    <div class="filters">
      <input type="text" placeholder="Buscar NF, parceiro ou cidade..." value="${esc(f.search)}" oninput="setMasterFilter('search', this.value)">
      <select onchange="setMasterFilter('mes', this.value)">
        <option value="">Todos os meses</option>
        ${meses.map(m=>`<option value="${m}" ${f.mes===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <select onchange="setMasterFilter('status', this.value)">
        <option value="">Todos os status</option>
        ${statuses.map(s=>`<option value="${esc(s)}" ${f.status===s?'selected':''}>${esc(s)}</option>`).join('')}
      </select>
      <select onchange="setMasterFilter('transportadora', this.value)">
        <option value="">Todas transportadoras</option>
        ${transps.map(t=>`<option value="${esc(t)}" ${f.transportadora===t?'selected':''}>${esc(t)}</option>`).join('')}
      </select>
      <select onchange="setMasterFilter('uf', this.value)">
        <option value="">Todas UFs</option>
        ${ufs.map(u=>`<option value="${u}" ${f.uf===u?'selected':''}>${u}</option>`).join('')}
      </select>
      <select onchange="setMasterFilter('regiao', this.value)">
        <option value="">Todas regiões</option>
        ${REGIOES.map(r=>`<option value="${r}" ${f.regiao===r?'selected':''}>${r}</option>`).join('')}
      </select>
      <button class="clear" onclick="clearMasterFilters()">Limpar filtros</button>
    </div>
    <div class="table-wrap">
      <table><thead>${TABLE_HEAD}</thead><tbody>${renderNFTableBody(pageRows)}</tbody></table>
      ${paginationHtml(rows.length, f.page, f.pageSize, 'setMasterPage')}
    </div>
  `;
}
function setMasterFilter(key, val){ state.master[key]=val; state.master.page=1; renderContent(); }
function clearMasterFilters(){ state.master = {...state.master, search:'', mes:'', status:'', transportadora:'', uf:'', regiao:'', page:1}; renderContent(); }
function setMasterPage(p){ state.master.page = Math.max(1,p); renderContent(); }

/* ============================================================
   TELA 4 — PENDÊNCIAS
============================================================ */
function applyPendFilters(){
  const f = state.pend;
  let rows = withIdx(state.data).filter(r=>r.status==='⚠ Preencher');
  if(f.mes) rows = rows.filter(r=>r.mes===f.mes);
  if(f.transportadora) rows = rows.filter(r=>r.transportadora===f.transportadora);
  if(f.uf) rows = rows.filter(r=>r.uf===f.uf);
  return rows;
}
function tplPendencias(){
  const f = state.pend;
  const rows = applyPendFilters();
  const pageRows = tableRows(rows, f.page, f.pageSize);
  const meses = sortMeses(uniqueSorted(state.data.map(r=>r.mes)));
  const transps = uniqueSorted(state.data.filter(r=>r.status==='⚠ Preencher').map(r=>r.transportadora));
  const ufs = uniqueSorted(state.data.filter(r=>r.status==='⚠ Preencher').map(r=>r.uf));
  const total = state.data.filter(r=>r.status==='⚠ Preencher').length;

  return `
    <h1 class="page-title">Pendências</h1>
    <p class="page-sub">${fmtNum(total)} NFs marcadas como <b>⚠ Preencher</b>.</p>
    <div class="filters">
      <select onchange="setPendFilter('mes', this.value)">
        <option value="">Todos os meses</option>
        ${meses.map(m=>`<option value="${m}" ${f.mes===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <select onchange="setPendFilter('transportadora', this.value)">
        <option value="">Todas transportadoras</option>
        ${transps.map(t=>`<option value="${esc(t)}" ${f.transportadora===t?'selected':''}>${esc(t)}</option>`).join('')}
      </select>
      <select onchange="setPendFilter('uf', this.value)">
        <option value="">Todas UFs</option>
        ${ufs.map(u=>`<option value="${u}" ${f.uf===u?'selected':''}>${u}</option>`).join('')}
      </select>
      <button class="clear" onclick="clearPendFilters()">Limpar filtros</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Mês</th><th>Nº NF</th><th>Parceiro</th><th>Cidade/UF</th><th>Transportadora</th><th>Fat. (R$)</th><th>Pendência</th><th>Região</th></tr></thead>
      <tbody>${pageRows.map(r=>`
        <tr onclick='openModal(${r.__idx})'>
          <td>${esc(r.mes)}</td><td>${esc(r.nf)}</td><td>${esc(r.parceiro)}</td>
          <td>${esc(r.cidade)}/${esc(r.uf)}</td><td>${esc(r.transportadora)}</td>
          <td>${fmtBRL(r.fat)}</td><td><span class="badge badge-warn">${esc(r.pendencia)}</span></td><td>${esc(r.regiao)}</td>
        </tr>`).join('')}</tbody></table>
      ${paginationHtml(rows.length, f.page, f.pageSize, 'setPendPage')}
    </div>
  `;
}
function setPendFilter(key, val){ state.pend[key]=val; state.pend.page=1; renderContent(); }
function clearPendFilters(){ state.pend = {...state.pend, mes:'', transportadora:'', uf:'', page:1}; renderContent(); }
function setPendPage(p){ state.pend.page = Math.max(1,p); renderContent(); }

/* ============================================================
   TELA 5 — TRANSPORTADORAS
============================================================ */
function tplTransportadoras(){
  const groups = groupByTransportadora(state.data);
  if(state.transp.selected){
    return tplTransportadoraDetail(state.transp.selected, groups);
  }
  return `
    <h1 class="page-title">Transportadoras</h1>
    <p class="page-sub">${groups.length} transportadoras identificadas. Clique em um card para ver o detalhamento.</p>
    <div class="grid grid-3">
      ${groups.map(t=>`
        <div class="card tcard" onclick="openTransportadora('${escJs(t.nome)}')">
          <div class="name">${esc(t.nome)}</div>
          <div class="row"><span>NFs</span><b>${fmtNum(t.count)}</b></div>
          <div class="row"><span>Faturamento</span><b>${fmtBRL(t.fat)}</b></div>
          <div class="row"><span>Frete</span><b>${fmtBRL(t.frete)}</b></div>
          <div class="row"><span>Pendentes</span><b>${fmtNum(t.pendentes)}</b></div>
        </div>`).join('')}
    </div>
  `;
}
function tplTransportadoraDetail(nome, groups){
  const g = groups.find(x=>x.nome===nome) || {count:0,fat:0,frete:0,pendentes:0};
  const f = state.transp;
  const rows = withIdx(state.data).filter(r=>(r.transportadora||'— Não informada')===nome);
  const pageRows = tableRows(rows, f.page, f.pageSize);
  return `
    <button class="btn btn-outline btn-sm" style="margin-bottom:14px;" onclick="backToTransportadoras()">← Voltar</button>
    <h1 class="page-title">${esc(nome)}</h1>
    <p class="page-sub">Detalhamento completo da transportadora.</p>
    <div class="grid grid-4 section">
      <div class="card kpi"><div class="label">NFs</div><div class="value">${fmtNum(g.count)}</div></div>
      <div class="card kpi"><div class="label">Faturamento</div><div class="value" style="font-size:19px;">${fmtBRL(g.fat)}</div></div>
      <div class="card kpi"><div class="label">Frete</div><div class="value" style="font-size:19px;">${fmtBRL(g.frete)}</div></div>
      <div class="card kpi"><div class="label">Pendentes</div><div class="value">${fmtNum(g.pendentes)}</div></div>
    </div>
    <div class="table-wrap">
      <table><thead>${TABLE_HEAD}</thead><tbody>${renderNFTableBody(pageRows)}</tbody></table>
      ${paginationHtml(rows.length, f.page, f.pageSize, 'setTranspPage')}
    </div>
  `;
}
function backToTransportadoras(){ state.transp.selected=null; renderContent(); }
function setTranspPage(p){ state.transp.page = Math.max(1,p); renderContent(); }

/* ============================================================
   TELA 6 — CONCILIAÇÃO
============================================================ */
function tplConciliacao(){
  const d = state.data;
  const conciliadas = d.filter(isConciliada);
  const pendentes = d.filter(isPendente);
  const divergencias = d.filter(isDivergencia);
  const naoAplica = d.filter(isNaoAplica);

  return `
    <h1 class="page-title">Conciliação</h1>
    <p class="page-sub">Situação de conciliação de frete das NFs.</p>
    <div class="grid grid-4 section">
      <div class="card kpi"><div class="label">Conciliadas</div><div class="value" style="color:var(--ok)">${fmtNum(conciliadas.length)}</div></div>
      <div class="card kpi"><div class="label">Pendentes</div><div class="value" style="color:var(--warn)">${fmtNum(pendentes.length)}</div></div>
      <div class="card kpi"><div class="label">Divergências</div><div class="value" style="color:var(--danger)">${fmtNum(divergencias.length)}</div></div>
      <div class="card kpi"><div class="label">Não Aplica</div><div class="value" style="color:var(--muted)">${fmtNum(naoAplica.length)}</div></div>
    </div>
    <div class="section">
      <div class="section-head"><h3>Divergências (status e pendência inconsistentes)</h3></div>
      <div class="table-wrap">
        <table><thead><tr><th>Mês</th><th>Nº NF</th><th>Parceiro</th><th>Transportadora</th><th>Status</th><th>Pendência</th></tr></thead>
        <tbody>${withIdx(divergencias).slice(0,200).map(r=>`
          <tr onclick='openModal(${r.__idx})'>
            <td>${esc(r.mes)}</td><td>${esc(r.nf)}</td><td>${esc(r.parceiro)}</td>
            <td>${esc(r.transportadora)}</td><td>${statusBadge(r.status)}</td><td>${esc(r.pendencia)||'—'}</td>
          </tr>`).join('') || `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px;">Nenhuma divergência encontrada</td></tr>`}</tbody></table>
      </div>
    </div>
  `;
}

/* ============================================================
   TELA 7 — POR MÊS
============================================================ */
function tplPorMes(){
  const meses = sortMeses(uniqueSorted(state.data.map(r=>r.mes)));
  const sel = state.mes.selected;
  const summary = meses.map(m=>{
    const rows = state.data.filter(r=>r.mes===m);
    return { mes:m, count:rows.length, fat: rows.reduce((s,r)=>s+(r.fat||0),0), frete: rows.reduce((s,r)=>s+(r.frete||0),0), pend: rows.filter(r=>r.status==='⚠ Preencher').length };
  });
  let detail = '';
  if(sel){
    const rows = withIdx(state.data).filter(r=>r.mes===sel);
    detail = `
      <div class="section">
        <div class="section-head"><h3>Detalhamento — ${esc(sel)}</h3></div>
        <div class="table-wrap">
          <table><thead>${TABLE_HEAD}</thead><tbody>${renderNFTableBody(rows.slice(0,500))}</tbody></table>
        </div>
      </div>`;
  }
  return `
    <h1 class="page-title">Por Mês</h1>
    <p class="page-sub">Clique em um mês para ver o detalhamento.</p>
    <div class="grid grid-3 section">
      ${summary.map(s=>`
        <div class="card pickcard ${sel===s.mes?'selected':''}" onclick="selectMes('${s.mes}')">
          <div class="top"><span class="name">${esc(s.mes)}</span><span class="chip">${fmtNum(s.count)} NFs</span></div>
          <div class="row" style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>Faturamento</span><b style="color:var(--text)">${fmtBRL(s.fat)}</b></div>
          <div class="row" style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>Frete</span><b style="color:var(--text)">${fmtBRL(s.frete)}</b></div>
          <div class="row" style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>Pendentes</span><b style="color:var(--text)">${fmtNum(s.pend)}</b></div>
        </div>`).join('')}
    </div>
    ${detail}
  `;
}
function selectMes(m){ state.mes.selected = (state.mes.selected===m) ? null : m; renderContent(); }

/* ============================================================
   TELA 9 — FILTRO POR REGIÃO
============================================================ */
function tplRegiao(){
  const sel = state.regiao.selected;
  const summary = REGIOES.map(r=>{
    const rows = state.data.filter(x=>x.regiao===r);
    return { regiao:r, count:rows.length, fat: rows.reduce((s,x)=>s+(x.fat||0),0), frete: rows.reduce((s,x)=>s+(x.frete||0),0), pend: rows.filter(x=>x.status==='⚠ Preencher').length };
  });
  let detail = '';
  if(sel){
    const rows = withIdx(state.data).filter(r=>r.regiao===sel);
    detail = `
      <div class="section">
        <div class="section-head"><h3>Detalhamento — ${esc(sel)}</h3></div>
        <div class="table-wrap">
          <table><thead>${TABLE_HEAD}</thead><tbody>${renderNFTableBody(rows.slice(0,500))}</tbody></table>
        </div>
      </div>`;
  }
  return `
    <h1 class="page-title">Filtro por Região</h1>
    <p class="page-sub">Clique em uma região para ver o detalhamento.</p>
    <div class="grid grid-5 section">
      ${summary.map(s=>`
        <div class="card pickcard ${sel===s.regiao?'selected':''}" onclick="selectRegiao('${s.regiao}')">
          <div class="top"><span class="name">${esc(s.regiao)}</span></div>
          <div class="row" style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>NFs</span><b style="color:var(--text)">${fmtNum(s.count)}</b></div>
          <div class="row" style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>Fat.</span><b style="color:var(--text)">${fmtBRL(s.fat)}</b></div>
          <div class="row" style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>Pendentes</span><b style="color:var(--text)">${fmtNum(s.pend)}</b></div>
        </div>`).join('')}
    </div>
    ${detail}
  `;
}
function selectRegiao(r){ state.regiao.selected = (state.regiao.selected===r) ? null : r; renderContent(); }

/* ============================================================
   TELA 8 — DETALHE DA NF (MODAL)
============================================================ */
function openModal(idx){
  const r = state.data[idx];
  if(!r) return;
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-head">
      <h3>NF ${esc(r.nf)}</h3>
      <button class="close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="modal-field"><div class="l">Mês / Trimestre</div><div class="v">${esc(r.mes)} · ${esc(r.trim)}</div></div>
        <div class="modal-field"><div class="l">Status</div><div class="v">${statusBadge(r.status)}</div></div>
        <div class="modal-field"><div class="l">Empresa</div><div class="v">${esc(r.empresa)}</div></div>
        <div class="modal-field"><div class="l">Parceiro</div><div class="v">${esc(r.parceiro)}</div></div>
        <div class="modal-field"><div class="l">Cidade / UF</div><div class="v">${esc(r.cidade)} / ${esc(r.uf)}</div></div>
        <div class="modal-field"><div class="l">Região</div><div class="v">${esc(r.regiao)}</div></div>
        <div class="modal-field"><div class="l">Tipo</div><div class="v">${esc(r.tipo)}</div></div>
        <div class="modal-field"><div class="l">Transportadora</div><div class="v">${esc(r.transportadora)}</div></div>
        <div class="modal-field"><div class="l">Faturamento</div><div class="v">${fmtBRL(r.fat)}</div></div>
        <div class="modal-field"><div class="l">Frete</div><div class="v">${fmtBRL(r.frete)}</div></div>
        <div class="modal-field" style="grid-column:1/-1;"><div class="l">Pendência</div><div class="v">${esc(r.pendencia)||'—'}</div></div>
      </div>
    </div>
  `;
  overlay.classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
}
document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

/* ============================================================
   INIT
============================================================ */
renderNav();
renderContent();
</script>
</body>
</html>
