<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papelito | Faturamento × Frete</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --black:#1A1A1A;
  --black-soft:#262626;
  --yellow:#FFD600;
  --yellow-dark:#E6C200;
  --bg:#F5F5F3;
  --card:#FFFFFF;
  --border:#E5E5E0;
  --text:#1A1A1A;
  --muted:#767671;
  --ok:#1E8E3E;
  --warn:#C77700;
  --danger:#C0392B;
  --info:#2563EB;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
#app{display:flex;min-height:100vh;}

/* SIDEBAR */
#sidebar{
  width:250px;
  min-width:250px;
  background:var(--black);
  color:#fff;
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
#sidebar .logo{
  padding:24px 20px 16px 20px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #333;
}
#sidebar .logo .dot{
  width:14px;height:14px;border-radius:3px;background:var(--yellow);
}
#sidebar .logo .title{font-weight:800;font-size:17px;letter-spacing:.3px;}
#sidebar .logo .sub{font-size:11px;color:#999;margin-top:2px;}
#sidebar nav{padding:14px 10px;flex:1;}
.mode-switch{display:flex;flex-direction:column;gap:6px;padding:4px 2px 14px 2px;margin-bottom:10px;border-bottom:1px solid #333;}
.mode-btn{
  background:#222;border:1px solid #3a3a3a;color:#bbb;padding:9px 10px;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;text-align:left;
}
.mode-btn.active{background:var(--yellow);color:var(--black);border-color:var(--yellow);}
.mode-btn:hover:not(.active){background:#2c2c2c;color:#fff;}
.nav-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;text-align:left;
  background:transparent;border:none;color:#ccc;
  padding:11px 12px;border-radius:8px;font-size:13.5px;font-weight:600;
  cursor:pointer;margin-bottom:2px;transition:.15s;
}
.nav-btn:hover{background:#2c2c2c;color:#fff;}
.nav-btn.active{background:var(--yellow);color:var(--black);}
.nav-btn[disabled]{opacity:.35;cursor:not-allowed;}
.nav-btn .n{
  width:20px;height:20px;border-radius:5px;background:#333;color:#ccc;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none;
}
.nav-btn.active .n{background:var(--black);color:var(--yellow);}
#sidebar .footer{padding:14px 20px;font-size:10.5px;color:#666;border-top:1px solid #333;}

/* CONTENT */
#content{flex:1;padding:28px 32px;max-width:100%;overflow-x:hidden;}
.page-title{font-size:22px;font-weight:800;margin:0 0 4px 0;}
.page-sub{color:var(--muted);font-size:13.5px;margin:0 0 22px 0;}

/* CARDS / KPI */
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-5{grid-template-columns:repeat(5,1fr);}
@media(max-width:1100px){.grid-4,.grid-3,.grid-5{grid-template-columns:repeat(2,1fr);}}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;
}
.kpi .label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.kpi .value{font-size:26px;font-weight:800;margin-top:6px;}
.kpi .bar{height:4px;border-radius:3px;background:var(--yellow);margin-top:12px;width:40%;}

.section{margin-bottom:26px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-head h3{font-size:15px;margin:0;font-weight:800;}

/* BUTTONS */
.btn{
  background:var(--black);color:var(--yellow);border:none;border-radius:8px;
  padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;
}
.btn:hover{background:#333;}
.btn-yellow{background:var(--yellow);color:var(--black);}
.btn-yellow:hover{background:var(--yellow-dark);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{background:#eee;}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:6px;}

/* TABLE */
.table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{
  background:var(--black);color:#fff;text-align:left;padding:10px 12px;
  position:sticky;top:0;white-space:nowrap;font-size:11.5px;letter-spacing:.3px;
}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{cursor:pointer;}
tbody tr:hover{background:#FFFBEA;}
.badge{
  display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;
}
.badge-ok{background:#E5F6EA;color:var(--ok);}
.badge-warn{background:#FFF3DC;color:var(--warn);}
.badge-na{background:#EEE;color:var(--muted);}
.badge-wait{background:#E6EEFF;color:var(--info);}

/* FILTER BAR */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center;}
.filters select,.filters input[type=text]{
  padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;background:#fff;min-width:130px;
}
.filters input[type=text]{min-width:220px;}
.filters .clear{color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;background:none;border:none;}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:12.5px;color:var(--muted);}
.pagination .pages{display:flex;gap:6px;}
.pagination button{border:1px solid var(--border);background:#fff;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;}
.pagination button.active{background:var(--black);color:var(--yellow);border-color:var(--black);}
.pagination button:disabled{opacity:.4;cursor:default;}

/* UPLOAD */
.upload-zone{
  border:2px dashed var(--border);border-radius:16px;background:var(--card);
  padding:60px 30px;text-align:center;max-width:640px;margin:40px auto;
}
.upload-zone.drag{border-color:var(--yellow);background:#FFFBEA;}
.upload-zone .icon{font-size:44px;margin-bottom:14px;}
.upload-zone h2{margin:0 0 6px;font-size:18px;}
.upload-zone p{color:var(--muted);font-size:13px;margin:0 0 20px;}

/* TRANSPORTADORA CARD */
.tcard{cursor:pointer;transition:.15s;}
.tcard:hover{border-color:var(--yellow);box-shadow:0 2px 10px rgba(0,0,0,.06);}
.tcard .name{font-weight:800;font-size:13px;margin-bottom:8px;}
.tcard .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:2px 0;}
.tcard .row b{color:var(--text);}

/* MODAL */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  z-index:999;
}
#modal-overlay.hidden{display:none;}
#modal{
  background:#fff;border-radius:14px;width:560px;max-width:92vw;max-height:86vh;overflow-y:auto;
  padding:0;
}
.modal-head{background:var(--black);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;border-radius:14px 14px 0 0;}
.modal-head h3{margin:0;font-size:16px;}
.modal-head .close{background:none;border:none;color:var(--yellow);font-size:22px;cursor:pointer;line-height:1;}
.modal-body{padding:20px 22px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;}
.modal-field .l{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.3px;}
.modal-field .v{font-size:14px;font-weight:600;margin-top:2px;}

/* MONTH / REGION CARDS */
.pickcard{cursor:pointer;transition:.15s;}
.pickcard.selected{border-color:var(--yellow);background:#FFFBEA;box-shadow:0 0 0 2px var(--yellow) inset;}
.pickcard:hover{border-color:var(--yellow-dark);}
.pickcard .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pickcard .top .name{font-weight:800;font-size:14px;}
.pickcard .top .chip{background:var(--black);color:var(--yellow);font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;}

.empty-state{padding:60px 20px;text-align:center;color:var(--muted);}
.meta-card{border-radius:14px;padding:22px 24px;color:#fff;position:relative;overflow:hidden;}
.meta-card.dentro{background:linear-gradient(135deg,#1A1A1A,#233d2b);}
.meta-card.fora{background:linear-gradient(135deg,#1A1A1A,#4a2323);}
.meta-card .mc-label{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:#bbb;font-weight:700;}
.meta-card .mc-value{font-size:34px;font-weight:800;margin:8px 0 4px;}
.meta-card .mc-meta{font-size:12.5px;color:#ccc;}
.meta-card .mc-tag{display:inline-block;margin-top:10px;padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:800;letter-spacing:.3px;}
.meta-card.dentro .mc-tag{background:#2E7D32;color:#fff;}
.meta-card.fora .mc-tag{background:#C0392B;color:#fff;}
.meta-card .mc-empty{font-size:13px;color:#999;margin-top:10px;}
.meta-card .mc-empty a{color:var(--yellow);cursor:pointer;text-decoration:underline;}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--muted);gap:8px;padding:2px 0;}
.stat-row b{color:var(--text);white-space:nowrap;text-align:right;}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;height:320px;}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
@media(max-width:1100px){.two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">
      <div class="dot"></div>
      <div>
        <div class="title">PAPELITO</div>
        <div class="sub">Faturamento × Frete</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="footer">Marcos Cordeiro · Logística/Suprimentos</div>
  </aside>
  <main id="content"></main>
</div>
<div id="modal-overlay" class="hidden">
  <div id="modal"></div>
</div>

<script>
/* ============================================================
   ESTADO GLOBAL
============================================================ */
const state = {
  data: [],
  mode: 'cliente', // 'cliente' | 'fabrica'
  screen: 'upload',
  master: { search:'', mes:'', status:'', transportadora:'', uf:'', regiao:'', page:1, pageSize:25 },
  pend:   { mes:'', transportadora:'', uf:'', page:1, pageSize:25 },
  transp: { selected:null, page:1, pageSize:25 },
  mes:    { selected:null },
  regiao: { selected:null },
  charts: {},
  fabrica: {
    data: [],
    screen: 'uploadFabrica',
    master: { search:'', mes:'', transportadora:'', page:1, pageSize:25 },
    entregaSelecionada: null,
    mes: { selected:null }
  }
};

const MES_ORDER = { Jan:1, Fev:2, Mar:3, Abr:4, Mai:5, Jun:6, Jul:7, Ago:8, Set:9, Out:10, Nov:11, Dez:12 };
const MES_NOMES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const REGIOES = ['Norte','Nordeste','Centro-Oeste','Sudeste','Sul'];
const ALLOWED_TIPOS = ['VENDA','BONIFICACAO']; // análise considera só Venda e Bonificação (combinado com o Marcos)
const META_CLIENTE = 2;   // meta % Frete/Faturamento — venda cliente final
const META_FABRICA = 3;   // meta % Frete/Valor NF — venda entre empresas (fábrica)

const SCREENS = [
  { id:'upload',        label:'Upload',          n:1 },
  { id:'dashboard',     label:'Dashboard',        n:2 },
  { id:'master',        label:'Master NFs',       n:3 },
  { id:'pendencias',    label:'Pendências',       n:4 },
  { id:'transportadoras',label:'Transportadoras', n:5 },
  { id:'conciliacao',   label:'Conciliação',      n:6 },
  { id:'porMes',        label:'Por Mês',          n:7 },
  { id:'regiao',        label:'Filtro Região',    n:9 },
];

const FABRICA_SCREENS = [
  { id:'uploadFabrica',    label:'Upload',        n:1 },
  { id:'dashboardFabrica', label:'Dashboard',     n:2 },
  { id:'entregasFabrica',  label:'Entregas (NFs)',n:3 },
  { id:'produtosFabrica',  label:'Por Produto',   n:4 },
  { id:'porMesFabrica',    label:'Por Mês',       n:5 },
];

/* ============================================================
   HELPERS
============================================================ */
function fmtBRL(v){
  if(v===null||v===undefined||v===''||isNaN(v)) return '—';
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function fmtNum(v){ return v.toLocaleString('pt-BR'); }
function esc(s){ return (s===undefined||s===null) ? '' : String(s); }
function mesKey(mes){
  if(!mes) return 0;
  const [m,y] = mes.split('/');
  return (parseInt(y)*12) + (MES_ORDER[m]||0);
}
function sortMeses(list){
  return [...list].sort((a,b)=> mesKey(a)-mesKey(b));
}
function statusBadge(status){
  let cls='badge-na';
  if(status && status.indexOf('✔')>-1) cls='badge-ok';
  else if(status && status.indexOf('⚠')>-1) cls='badge-warn';
  else if(status && status.indexOf('⏳')>-1) cls='badge-wait';
  return `<span class="badge ${cls}">${esc(status)}</span>`;
}
function uniqueSorted(arr){ return [...new Set(arr.filter(x=>x!==undefined && x!==null && x!==''))].sort((a,b)=>a.localeCompare(b,'pt-BR')); }
function pctFrete(fat, frete){
  if(!fat) return '—';
  return ((frete||0)/fat*100).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
}
function pctFreteNum(fat, frete){
  if(!fat) return null;
  return (frete||0)/fat*100;
}
function metaCard(label, valueNum, valorLabel, metaPct, emptyLinkScreen, emptyLinkMode){
  if(valueNum===null){
    return `
      <div class="card meta-card dentro">
        <div class="mc-label">${esc(label)}</div>
        <div class="mc-value" style="font-size:20px;">Sem dados</div>
        <div class="mc-empty">Carregue o arquivo pra calcular. <a onclick="setMode('${emptyLinkMode}');navigate('${emptyLinkScreen}')">Importar agora →</a></div>
      </div>`;
  }
  const dentro = valueNum <= metaPct;
  const fmtVal = valueNum.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
  return `
    <div class="card meta-card ${dentro?'dentro':'fora'}">
      <div class="mc-label">${esc(label)}</div>
      <div class="mc-value">${fmtVal}</div>
      <div class="mc-meta">${esc(valorLabel)} · Meta: até ${metaPct}%</div>
      <span class="mc-tag">${dentro?'✔ DENTRO DA META':'⚠ FORA DA META'}</span>
    </div>`;
}
function groupByRegiao(data){
  return REGIOES.map(r=>{
    const rows = data.filter(x=>x.regiao===r);
    return { regiao:r, count:rows.length, fat: rows.reduce((s,x)=>s+(x.fat||0),0), frete: rows.reduce((s,x)=>s+(x.frete||0),0), pend: rows.filter(x=>x.status==='⚠ Preencher').length };
  });
}
function groupByTrimestre(data){
  const trims = uniqueSorted(data.map(r=>r.trim)).sort();
  return trims.map(t=>{
    const rows = data.filter(r=>r.trim===t);
    return { trim:t, count:rows.length, fat: rows.reduce((s,r)=>s+(r.fat||0),0), frete: rows.reduce((s,r)=>s+(r.frete||0),0) };
  });
}

function isConciliada(r){ return (r.status==='✔ Frete OK'||r.status==='✔ Encontrado') && !r.pendencia; }
function isDivergencia(r){
  const okStatus = (r.status==='✔ Frete OK'||r.status==='✔ Encontrado');
  return okStatus && !!r.pendencia;
}
function isPendente(r){ return (r.status==='⚠ Preencher'||r.status==='⏳ Chegada na filial'); }
function isNaoAplica(r){ return r.status==='— Não aplica'; }

/* ============================================================
   NAVEGAÇÃO
============================================================ */
function renderNav(){
  const nav = document.getElementById('nav');
  const screens = state.mode==='cliente' ? SCREENS : FABRICA_SCREENS;
  const curScreen = state.mode==='cliente' ? state.screen : state.fabrica.screen;
  const dataLen = state.mode==='cliente' ? state.data.length : state.fabrica.data.length;
  const uploadId = state.mode==='cliente' ? 'upload' : 'uploadFabrica';
  nav.innerHTML = `
    <div class="mode-switch">
      <button class="mode-btn ${state.mode==='cliente'?'active':''}" onclick="setMode('cliente')">Vendas Cliente Final</button>
      <button class="mode-btn ${state.mode==='fabrica'?'active':''}" onclick="setMode('fabrica')">Vendas Fábrica</button>
    </div>
    ${screens.map(s=>{
      const disabled = dataLen===0 && s.id!==uploadId;
      return `<button class="nav-btn ${curScreen===s.id?'active':''}" ${disabled?'disabled':''} onclick="navigate('${s.id}')">
        <span class="n">${s.n}</span> ${s.label}
      </button>`;
    }).join('')}
  `;
}
function setMode(mode){
  state.mode = mode;
  renderNav();
  renderContent();
}
function navigate(screen){
  if(state.mode==='cliente'){
    if(state.data.length===0 && screen!=='upload') return;
    state.screen = screen;
  } else {
    if(state.fabrica.data.length===0 && screen!=='uploadFabrica') return;
    state.fabrica.screen = screen;
  }
  renderNav();
  renderContent();
}

function renderContent(){
  const c = document.getElementById('content');
  if(state.mode==='cliente'){
    switch(state.screen){
      case 'upload': c.innerHTML = tplUpload(); break;
      case 'dashboard': c.innerHTML = tplDashboard(); afterDashboard(); break;
      case 'master': c.innerHTML = tplMaster(); break;
      case 'pendencias': c.innerHTML = tplPendencias(); break;
      case 'transportadoras': c.innerHTML = tplTransportadoras(); break;
      case 'conciliacao': c.innerHTML = tplConciliacao(); break;
      case 'porMes': c.innerHTML = tplPorMes(); break;
      case 'regiao': c.innerHTML = tplRegiao(); break;
    }
  } else {
    switch(state.fabrica.screen){
      case 'uploadFabrica': c.innerHTML = tplUploadFabrica(); break;
      case 'dashboardFabrica': c.innerHTML = tplDashboardFabrica(); afterDashboardFabrica(); break;
      case 'entregasFabrica': c.innerHTML = tplEntregasFabrica(); break;
      case 'produtosFabrica': c.innerHTML = tplProdutosFabrica(); break;
      case 'porMesFabrica': c.innerHTML = tplPorMesFabrica(); break;
    }
  }
}

/* ============================================================
   TELA 1 — UPLOAD
============================================================ */
function tplUpload(){
  const loaded = state.data.length>0;
  return `
    <h1 class="page-title">Importar Master de Pendências</h1>
    <p class="page-sub">Envie o arquivo Excel (.xlsx) com o cabeçalho na 4ª linha.</p>
    <div class="upload-zone" id="dropzone" ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <div class="icon">📄</div>
      <h2>${loaded ? 'Arquivo carregado com sucesso' : 'Arraste o arquivo aqui'}</h2>
      <p>${loaded ? state.data.length + ' NFs importadas — pode importar outro arquivo para substituir os dados.' : 'ou clique no botão abaixo para selecionar (.xlsx)'}</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(event.target.files[0])">
      <button class="btn btn-yellow" onclick="document.getElementById('fileInput').click()">Selecionar arquivo Excel</button>
      <div id="uploadMsg" style="margin-top:14px;font-size:13px;color:var(--muted);"></div>
    </div>
    ${loaded ? `<div style="max-width:640px;margin:0 auto;"><button class="btn btn-outline" onclick="navigate('dashboard')">Ir para o Dashboard →</button></div>` : ''}
  `;
}
function handleDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(file) handleFile(file);
}
function handleFile(file){
  if(!file) return;
  const msg = ()=>document.getElementById('uploadMsg');
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      // linha 4 (índice 3) é o cabeçalho -> range começa em 3
      const rows = XLSX.utils.sheet_to_json(sheet, {range:3, defval:null});
      const parsed = rows.filter(r => r['Nº NF']!==null && r['Nº NF']!==undefined && r['Nº NF']!=='').map(r=>({
        mes: r['MÊS'] ?? '',
        trim: r['TRIM.'] ?? '',
        nf: r['Nº NF'] ?? '',
        empresa: r['EMPRESA'] ?? '',
        parceiro: r['PARCEIRO'] ?? '',
        cidade: r['CIDADE'] ?? '',
        uf: r['UF'] ?? '',
        tipo: r['TIPO'] ?? '',
        transportadora: r['TRANSPORTADORA'] ?? '',
        fat: (typeof r['FAT. (R$)']==='number') ? r['FAT. (R$)'] : parseBRNumber(r['FAT. (R$)']),
        frete: (typeof r['FRETE (R$)']==='number') ? r['FRETE (R$)'] : parseBRNumber(r['FRETE (R$)']),
        status: r['STATUS'] ?? '',
        pendencia: r['PENDÊNCIA'] ?? '',
        regiao: r['REGIÃO'] ?? '',
      }));
      if(parsed.length===0){
        if(msg()) msg().innerHTML = '<span style="color:var(--danger)">Nenhuma linha de dados encontrada. Verifique o layout do arquivo.</span>';
        return;
      }
      const totalBruto = parsed.length;
      const dataFiltrada = parsed.filter(r => ALLOWED_TIPOS.includes(r.tipo));
      const excluidos = totalBruto - dataFiltrada.length;
      state.data = dataFiltrada;
      resetFilters();
      if(msg()) msg().innerHTML = `<span style="color:var(--ok)">${dataFiltrada.length} NFs carregadas com sucesso!</span> <span style="color:var(--muted)">(${excluidos} registros de Transferência/Devolução foram desconsiderados da análise — só entram Venda e Bonificação)</span>`;
      renderNav();
      navigate('dashboard');
    }catch(err){
      console.error(err);
      if(msg()) msg().innerHTML = '<span style="color:var(--danger)">Erro ao ler o arquivo: '+err.message+'</span>';
    }
  };
  reader.readAsArrayBuffer(file);
}
function parseBRNumber(v){
  if(v===null || v===undefined || v==='') return null;
  if(typeof v==='number') return v;
  const cleaned = String(v).replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'');
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : n;
}
function resetFilters(){
  state.master = { search:'', mes:'', status:'', transportadora:'', uf:'', regiao:'', page:1, pageSize:25 };

function groupByTransportadora(data){
  const map = {};
  data.forEach(r=>{
    const k = r.transportadora || '— Não informada';
    if(!map[k]) map[k] = { nome:k, count:0, fat:0, frete:0, pendentes:0 };
    map[k].count++;
    map[k].fat += (r.fat||0);
    map[k].frete += (r.frete||0);
    if(r.status==='⚠ Preencher') map[k].pendentes++;
  });
  return Object.values(map).sort((a,b)=> b.fat-a.fat);
}

/* ============================================================
   TABELA GENÉRICA (usada em várias telas)
============================================================ */
function tableRows(rows, page, pageSize){
  const start = (page-1)*pageSize;
  return rows.slice(start, start+pageSize);
}
function paginationHtml(total, page, pageSize, fnName){
  const pages = Math.max(1, Math.ceil(total/pageSize));
  const start = total===0? 0 : (page-1)*pageSize+1;
  const end = Math.min(total, page*pageSize);
  let btns = '';
  const maxBtns = 7;
  let from = Math.max(1, page-3), to = Math.min(pages, from+maxBtns-1);
  from = Math.max(1, to-maxBtns+1);
  for(let p=from;p<=to;p++){
    btns += `<button class="${p===page?'active':''}" onclick="${fnName}(${p})">${p}</button>`;
  }
  return `
    <div class="pagination">
      <span>${start}–${end} de ${total}</span>
      <div class="pages">
        <button onclick="${fnName}(${page-1})" ${page<=1?'disabled':''}>‹</button>
        ${btns}
        <button onclick="${fnName}(${page+1})" ${page>=pages?'disabled':''}>›</button>
      </div>
    </div>`;
}

/* ============================================================
   MÓDULO FÁBRICA — VENDA ENTRE EMPRESAS (Rolling Papers → RCS ES)
============================================================ */
function parseFabricaSheet(rows){
  const entregas = [];
  let i = 0;
  while(i < rows.length){
    const row = rows[i] || [];
    const marker = row[4];
    if(typeof marker === 'string' && /NF/i.test(marker)){
      const isTransferencia = /TRANSFEREN/i.test(marker);
      const isDevolucao = /DEVOLU/i.test(marker);
      const dateMatch = marker.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      const nfMatch = marker.match(/NF\s*:?\s*([0-9\/\sA-Za-zçÇãõÃÕ]+)/i);
      let dataISO = null, mes = '';
      if(dateMatch){
        const dd=dateMatch[1], mm=dateMatch[2], yy=dateMatch[3];
        dataISO = `${yy}-${mm}-${dd}`;
        const mi = parseInt(mm,10)-1;
        mes = (MES_NOMES[mi]||'?') + '/' + yy.slice(2);
      }
      const nf = nfMatch ? nfMatch[1].trim() : marker.trim();

      const headerRow = rows[i+1] || [];
      const colIndex = {};
      headerRow.forEach((h,idx)=>{ if(h!==null && h!==undefined && h!=='') colIndex[String(h).trim()] = idx; });

      let j = i+2;
      const itens = [];
      let totalRow = null;
      while(j < rows.length){
        const r = rows[j] || [];
        const isBlank = r.every(c => c===null || c===undefined || c==='');
        if(isBlank){ j++; break; }
        const codRolling = colIndex['Cod. Rolling']!==undefined ? r[colIndex['Cod. Rolling']] : null;
        if(codRolling !== null && codRolling !== undefined && codRolling !== ''){
          itens.push({
            codRolling: codRolling,
            codProtheus: colIndex['Cod. Protheus RCS']!==undefined ? r[colIndex['Cod. Protheus RCS']] : null,
            produto: colIndex['Produtos']!==undefined ? r[colIndex['Produtos']] : null,
            precoUnit: colIndex['Preço Unitario']!==undefined ? r[colIndex['Preço Unitario']] : null,
            caixas: colIndex['Caixas']!==undefined ? r[colIndex['Caixas']] : null,
            livretos: colIndex['Livretos']!==undefined ? r[colIndex['Livretos']] : null,
            displays: colIndex['Displays']!==undefined ? r[colIndex['Displays']] : null,
            valorProdutos: colIndex['Valor dos Produtos']!==undefined ? r[colIndex['Valor dos Produtos']] : null,
          });
        } else {
          const peso = colIndex['Peso']!==undefined ? r[colIndex['Peso']] : null;
          const caixasT = colIndex['Caixas']!==undefined ? r[colIndex['Caixas']] : null;
          if((typeof peso === 'number') || (typeof caixasT === 'number')){
            totalRow = r;
          }
        }
        j++;
      }
      if(totalRow){
        const freteVal = colIndex['Valor do Frete']!==undefined ? totalRow[colIndex['Valor do Frete']] : null;
        entregas.push({
          nf, data: dataISO, mes, isTransferencia, isDevolucao,
          peso: colIndex['Peso']!==undefined ? totalRow[colIndex['Peso']] : null,
          caixas: colIndex['Caixas']!==undefined ? totalRow[colIndex['Caixas']] : null,
          livretos: colIndex['Livretos']!==undefined ? totalRow[colIndex['Livretos']] : null,
          displays: colIndex['Displays']!==undefined ? totalRow[colIndex['Displays']] : null,
          pesoTotal: colIndex['Peso Total']!==undefined ? totalRow[colIndex['Peso Total']] : null,
          cubagemTotal: colIndex['Cubagem total']!==undefined ? totalRow[colIndex['Cubagem total']] : null,
          valorProdutos: colIndex['Valor dos Produtos']!==undefined ? totalRow[colIndex['Valor dos Produtos']] : null,
          valorNF: colIndex['Valor do ICMS']!==undefined ? totalRow[colIndex['Valor do ICMS']] : null,
          frete: (typeof freteVal === 'number') ? freteVal : null,
          valorPorLivreto: colIndex['Valor Por Livreto']!==undefined ? totalRow[colIndex['Valor Por Livreto']] : null,
          transportadora: colIndex['Transportadora']!==undefined ? totalRow[colIndex['Transportadora']] : null,
          itens
        });
      }
      i = j;
    } else {
      i++;
    }
  }
  return entregas;
}

function handleFileFabrica(file){
  if(!file) return;
  const msg = ()=>document.getElementById('uploadMsgFabrica');
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:null});
      const todas = parseFabricaSheet(rows);
      const semFrete = todas.filter(en => typeof en.frete !== 'number').length;
      const transferencias = todas.filter(en => en.isTransferencia && typeof en.frete === 'number').length;
      const validas = todas.filter(en => typeof en.frete === 'number' && !en.isTransferencia);
      if(validas.length===0){
        if(msg()) msg().innerHTML = '<span style="color:var(--danger)">Nenhuma entrega com Valor de Frete encontrada. Verifique o arquivo.</span>';
        return;
      }
      state.fabrica.data = validas;
      state.fabrica.master = { search:'', mes:'', transportadora:'', page:1, pageSize:25 };
      state.fabrica.entregaSelecionada = null;
      state.fabrica.mes = { selected:null };
      if(msg()) msg().innerHTML = `<span style="color:var(--ok)">${validas.length} entregas carregadas com sucesso!</span> <span style="color:var(--muted)">(${semFrete} entregas antigas sem Frete e ${transferencias} de Transferência foram desconsideradas)</span>`;
      renderNav();
      navigate('dashboardFabrica');
    }catch(err){
      console.error(err);
      if(msg()) msg().innerHTML = '<span style="color:var(--danger)">Erro ao ler o arquivo: '+err.message+'</span>';
    }
  };
  reader.readAsArrayBuffer(file);
}

function groupByTransportadoraFabrica(data){
  const map = {};
  data.forEach(e=>{
    const k = e.transportadora || '— Não informada';
    if(!map[k]) map[k] = { nome:k, count:0, valorNF:0, frete:0 };
    map[k].count++;
    map[k].valorNF += (e.valorNF||0);
    map[k].frete += (e.frete||0);
  });
  return Object.values(map).sort((a,b)=> b.valorNF-a.valorNF);
}
function groupByMesFabrica(data){
  const meses = sortMeses(uniqueSorted(data.map(e=>e.mes)));
  return meses.map(m=>{
    const rows = data.filter(e=>e.mes===m);
    return { mes:m, count:rows.length, valorNF: rows.reduce((s,e)=>s+(e.valorNF||0),0), frete: rows.reduce((s,e)=>s+(e.frete||0),0), pesoTotal: rows.reduce((s,e)=>s+(e.pesoTotal||0),0) };
  });
}

  state.fabrica.data.forEach(e=>{
    (e.itens||[]).forEach(it=>{
      const k = it.codRolling + ' — ' + (it.produto||'');
      if(!map[k]) map[k] = { produto: it.produto, cod: it.codRolling, caixas:0, livretos:0, valor:0 };
      map[k].caixas += (it.caixas||0);
      map[k].livretos += (it.livretos||0);
      map[k].valor += (it.valorProdutos||0);
    });
  });
  const list = Object.values(map).sort((a,b)=>b.valor-a.valor);
  return `
    <h1 class="page-title">Por Produto — Fábrica</h1>
    <p class="page-sub">${fmtNum(list.length)} produtos distintos enviados no período.</p>
    <div class="table-wrap">
      <table><thead><tr><th>Cód. Rolling</th><th>Produto</th><th>Caixas</th><th>Livretos</th><th>Valor (R$)</th></tr></thead>
      <tbody>${list.map(p=>`
        <tr><td>${esc(p.cod)}</td><td>${esc(p.produto)}</td><td>${fmtNum(p.caixas)}</td><td>${fmtNum(p.livretos)}</td><td>${fmtBRL(p.valor)}</td></tr>`).join('')}</tbody></table>
    </div>
  `;
}

function tplPorMesFabrica(){
  const porMes = groupByMesFabrica(state.fabrica.data);
  const sel = state.fabrica.mes.selected;
  let detail = '';
  if(sel){
    const rows = withIdxFabrica(state.fabrica.data).filter(e=>e.mes===sel);
    detail = `
      <div class="section">
        <div class="section-head"><h3>Detalhamento — ${esc(sel)}</h3></div>
        <div class="table-wrap">
          <table><thead><tr><th>NF</th><th>Transportadora</th><th>Valor NF</th><th>Frete</th><th>% Frete</th></tr></thead>
          <tbody>${rows.map(e=>`
            <tr onclick='openModalFabrica(${e.__idx})'>
              <td>${esc(e.nf)}</td><td>${esc(e.transportadora)}</td><td>${fmtBRL(e.valorNF)}</td><td>${fmtBRL(e.frete)}</td><td>${pctFrete(e.valorNF,e.frete)}</td>
            </tr>`).join('')}</tbody></table>
        </div>
      </div>`;
  }
  return `
    <h1 class="page-title">Por Mês — Fábrica</h1>
    <p class="page-sub">Clique em um mês para ver o detalhamento.</p>
    <div class="grid grid-3 section">
      ${porMes.map(m=>`
        <div class="card pickcard ${sel===m.mes?'selected':''}" onclick="selectMesFabrica('${m.mes}')">
          <div class="top"><span class="name">${esc(m.mes)}</span><span class="chip">${fmtNum(m.count)} entregas</span></div>
          <div class="stat-row"><span>Valor NF</span><b>${fmtBRL(m.valorNF)}</b></div>
          <div class="stat-row"><span>Frete</span><b>${fmtBRL(m.frete)}</b></div>
          <div class="stat-row"><span>% Frete</span><b style="color:var(--warn)">${pctFrete(m.valorNF,m.frete)}</b></div>
        </div>`).join('')}
    </div>
    ${detail}
  `;
}
function selectMesFabrica(m){ state.fabrica.mes.selected = (state.fabrica.mes.selected===m) ? null : m; renderContent(); }

function openModalFabrica(idx){
  const e = state.fabrica.data[idx];
  if(!e) return;
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-head">
      <h3>Entrega NF ${esc(e.nf)}</h3>
      <button class="close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="modal-field"><div class="l">Mês</div><div class="v">${esc(e.mes)}</div></div>
        <div class="modal-field"><div class="l">Transportadora</div><div class="v">${esc(e.transportadora)||'—'}</div></div>
        <div class="modal-field"><div class="l">Valor da NF</div><div class="v">${fmtBRL(e.valorNF)}</div></div>
        <div class="modal-field"><div class="l">Frete</div><div class="v">${fmtBRL(e.frete)}</div></div>
        <div class="modal-field"><div class="l">% Frete</div><div class="v">${pctFrete(e.valorNF,e.frete)}</div></div>
        <div class="modal-field"><div class="l">Peso Total</div><div class="v">${e.pesoTotal? fmtNum(Math.round(e.pesoTotal))+' kg' : '—'}</div></div>
        <div class="modal-field"><div class="l">Caixas / Livretos</div><div class="v">${fmtNum(e.caixas)} / ${fmtNum(e.livretos)}</div></div>
      </div>
      <div style="margin-top:18px;">
        <div class="l" style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px;">Produtos desta entrega</div>
        <div class="table-wrap">
          <table><thead><tr><th>Cód.</th><th>Produto</th><th>Caixas</th><th>Livretos</th><th>Valor</th></tr></thead>
          <tbody>${(e.itens||[]).map(it=>`<tr><td>${esc(it.codRolling)}</td><td>${esc(it.produto)}</td><td>${fmtNum(it.caixas)}</td><td>${fmtNum(it.livretos)}</td><td>${fmtBRL(it.valorProdutos)}</td></tr>`).join('')}</tbody></table>
        </div>
      </div>
    </div>
  `;
  overlay.classList.remove('hidden');
}

/* ============================================================
   INIT
============================================================ */
renderNav();
renderContent();
</script>
</body>
</html>
